<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salvadanaio Pro Dash - History & Trends</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --secondary-color: #818cf8;
            --success-color: #4ade80;
            --danger-color: #f43f5e;
            --warning-color: #facc15;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 900px;
            position: relative;
            margin-bottom: 20px;
        }

        .settings-bar {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }

        select {
            background: #334155;
            color: white;
            border: 2px solid #475569;
            padding: 8px 12px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        h1 { 
            font-size: 2.2rem; 
            text-align: center; 
            margin-bottom: 2rem;
            background: linear-gradient(to right, var(--accent-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: center;
        }

        @media (max-width: 768px) { .main-layout { grid-template-columns: 1fr; } }

        .input-section { display: flex; flex-direction: column; gap: 15px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.85rem; color: #94a3b8; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

        input {
            padding: 14px;
            border-radius: 12px;
            border: 2px solid #334155;
            background-color: #0f172a;
            color: white;
            font-size: 1.1rem;
        }

        button {
            margin-top: 10px;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent-color), var(--secondary-color));
            color: #fff;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:active { transform: scale(0.98); }

        .chart-container {
            position: relative;
            width: 100%;
            max-width: 280px;
            margin: 0 auto;
        }

        #percentage-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -40%);
            text-align: center;
        }

        #perc-val { font-size: 2.8rem; font-weight: 900; color: var(--accent-color); display: block; }
        #perc-label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; font-weight: bold; }

        .summary-box {
            background: rgba(15, 23, 42, 0.5);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #334155;
            margin-top: 25px;
        }

        .stat-row { display: flex; justify-content: space-between; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #334155; }
        .stat-label { color: #94a3b8; font-weight: 500; }
        .stat-value { font-weight: bold; }
        .missing-highlight { color: var(--warning-color); font-size: 1.3rem; }
        .saved-highlight { color: var(--success-color); font-size: 1.3rem; }

        .history-section {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        @media (max-width: 768px) { .history-section { grid-template-columns: 1fr; } }

        .card {
            background-color: var(--card-bg);
            padding: 1.5rem;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .history-list {
            max-height: 300px;
            overflow-y: auto;
            margin-top: 15px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #334155;
            font-size: 0.9rem;
        }

        .history-date { color: #94a3b8; }
        .amount-pos { color: var(--success-color); font-weight: bold; }
        .amount-neg { color: var(--danger-color); font-weight: bold; }

        #trendChartContainer {
            width: 100%;
            height: 300px;
        }
    </style>
</head>
<body onload="loadData()">

<div class="container">
    <div class="settings-bar">
        <select id="currencySelect" onchange="convertCurrency()">
            <option value="EUR">€ EUR</option>
            <option value="USD">$ USD</option>
            <option value="GBP">£ GBP</option>
        </select>
        <select id="langSelect" onchange="updateLanguage()">
            <option value="it">🇮🇹 IT</option>
            <option value="en">🇺🇸 EN</option>
            <option value="fr">🇫🇷 FR</option>
            <option value="de">🇩🇪 DE</option>
            <option value="sp">🇪🇸 SP</option>
        </select>
    </div>

    <h1 id="title">Salvadanaio Digitale</h1>
    
    <div class="main-layout">
        <div class="input-section">
            <div class="input-group">
                <label id="lblReason">Obiettivo di risparmio</label>
                <input type="text" id="reason" placeholder="...">
            </div>
            <div class="input-group">
                <label id="lblTarget">Target Totale</label>
                <input type="number" id="target" step="0.01">
            </div>
            <div class="input-group">
                <label id="lblSaved">Budget Attuale</label>
                <input type="number" id="saved" step="0.01">
            </div>
            <button onclick="calculate(true)" id="btnCalc">Salva e Aggiorna</button>
        </div>

        <div class="chart-section" id="resultsArea" style="visibility: hidden;">
            <div class="chart-container">
                <canvas id="myChart"></canvas>
                <div id="percentage-center">
                    <span id="perc-val">0%</span>
                    <span id="perc-label">Completato</span>
                </div>
            </div>
            
            <div class="summary-box">
                <div class="stat-row">
                    <span class="stat-label" id="txtMissing">Mancano:</span>
                    <span id="valRemaining" class="stat-value missing-highlight">0.00</span>
                </div>
                <div class="stat-row" style="border:none; margin:0;">
                    <span class="stat-label" id="txtSavedPerc">Accumulato:</span>
                    <span id="valSavedPerc" class="stat-value saved-highlight">0%</span>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="history-section">
    <div class="card">
        <h3 style="margin-top:0" id="titleTrend">Andamento Budget</h3>
        <div id="trendChartContainer">
            <canvas id="trendChart"></canvas>
        </div>
    </div>
    <div class="card">
        <h3 style="margin-top:0" id="titleHistory">Cronologia</h3>
        <div class="history-list" id="historyList"></div>
        <button onclick="clearHistory()" id="btnClearHistory" style="font-size: 0.7rem; padding: 8px; background: #334155; margin-top: 15px; width: 100%;">Svuota Cronologia</button>
    </div>
</div>

<script>
    let myChart = null;
    let trendChart = null;
    let currentCurrency = 'EUR';
    let historyData = [];
    
    const exchangeRates = { EUR: 1, USD: 1.08, GBP: 0.85 };
    const currencySymbols = { EUR: '€', USD: '$', GBP: '£' };

    const translations = {
        it: { 
            title: "Salvadanaio Digitale", lblReason: "Obiettivo di risparmio", lblTarget: "Target Totale", 
            lblSaved: "Budget Attuale", btnCalc: "Salva e Aggiorna", txtMissing: "Mancano:", 
            txtSavedPerc: "Accumulato:", completed: "Completato", saved: "Risparmiato", missing: "Mancante",
            trend: "Andamento Budget", history: "Cronologia", clearBtn: "Svuota Cronologia", confirmClear: "Vuoi davvero cancellare tutta la cronologia?"
        },
        en: { 
            title: "Digital Piggy Bank", lblReason: "Saving Goal", lblTarget: "Total Target", 
            lblSaved: "Current Budget", btnCalc: "Save & Update", txtMissing: "Remaining:", 
            txtSavedPerc: "Saved:", completed: "Completed", saved: "Saved", missing: "Missing",
            trend: "Budget Trend", history: "History Log", clearBtn: "Clear History", confirmClear: "Do you really want to clear the entire history?"
        },
        fr: { 
            title: "Ma Tirelire", lblReason: "Objectif d'épargne", lblTarget: "Cible Totale", 
            lblSaved: "Budget Actuel", btnCalc: "Sauver et Mettre à jour", txtMissing: "Restant:", 
            txtSavedPerc: "Accumulé:", completed: "Complété", saved: "Épargné", missing: "Manquant",
            trend: "Tendance du Budget", history: "Historique", clearBtn: "Effacer l'historique", confirmClear: "Voulez-vous vraiment effacer tout l'historique ?"
        },
        de: { 
            title: "Sparschwein", lblReason: "Sparziel", lblTarget: "Gesamtziel", 
            lblSaved: "Aktuelles Budget", btnCalc: "Speichern", txtMissing: "Fehlend:", 
            txtSavedPerc: "Gespart:", completed: "Abgeschlossen", saved: "Gespart", missing: "Fehlend",
            trend: "Budget-Verlauf", history: "Verlauf", clearBtn: "Verlauf löschen", confirmClear: "Möchten Sie wirklich den gesamten Verlauf löschen?"
        },
        sp: { 
            title: "Mi Hucha Digital", lblReason: "Meta de ahorro", lblTarget: "Meta Total", 
            lblSaved: "Ahorro Actual", btnCalc: "Guardar y Actualizar", txtMissing: "Faltante:", 
            txtSavedPerc: "Acumulado:", completed: "Completado", saved: "Ahorrado", missing: "Faltante",
            trend: "Tendencia del Presupuesto", history: "Historial", clearBtn: "Limpiar Historial", confirmClear: "¿Realmente quieres borrar todo il historial?"
        }
    };

    function saveData() {
        const data = {
            reason: document.getElementById('reason').value,
            target: document.getElementById('target').value,
            saved: document.getElementById('saved').value,
            currency: document.getElementById('currencySelect').value,
            lang: document.getElementById('langSelect').value,
            history: historyData
        };
        localStorage.setItem('piggyBankData_v2', JSON.stringify(data));
    }

    function loadData() {
        const savedData = localStorage.getItem('piggyBankData_v2');
        if (savedData) {
            const data = JSON.parse(savedData);
            document.getElementById('reason').value = data.reason || "";
            document.getElementById('target').value = data.target || "";
            document.getElementById('saved').value = data.saved || "";
            document.getElementById('currencySelect').value = data.currency || "EUR";
            document.getElementById('langSelect').value = data.lang || "it";
            historyData = data.history || [];
            currentCurrency = data.currency || "EUR";
            updateLanguage();
            updateHistoryUI();
        }
    }

    function updateHistoryUI() {
        const list = document.getElementById('historyList');
        list.innerHTML = '';
        [...historyData].reverse().forEach(item => {
            const div = document.createElement('div');
            div.className = 'history-item';
            const symbol = currencySymbols[currentCurrency];
            const diffClass = item.diff >= 0 ? 'amount-pos' : 'amount-neg';
            const sign = item.diff >= 0 ? '+' : '';
            div.innerHTML = `
                <span class="history-date">${item.date}</span>
                <span class="${diffClass}">${sign}${item.diff.toFixed(2)} ${symbol}</span>
            `;
            list.appendChild(div);
        });
        updateTrendChart();
    }

    function clearHistory() {
        const lang = document.getElementById('langSelect').value;
        if(confirm(translations[lang].confirmClear)) {
            historyData = [];
            saveData();
            updateHistoryUI();
        }
    }

    function updateTrendChart() {
        const ctx = document.getElementById('trendChart').getContext('2d');
        if (trendChart) trendChart.destroy();
        const labels = historyData.map(h => h.date.split(',')[0]);
        const values = historyData.map(h => h.amount);
        trendChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    data: values,
                    borderColor: '#38bdf8',
                    backgroundColor: 'rgba(56, 189, 248, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
                    x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                }
            }
        });
    }

    function calculate(isManualUpdate = false) {
        const target = parseFloat(document.getElementById('target').value) || 0;
        const saved = parseFloat(document.getElementById('saved').value) || 0;
        const lang = document.getElementById('langSelect').value;
        const symbol = currencySymbols[currentCurrency];
        
        if (target <= 0) {
            document.getElementById('resultsArea').style.visibility = 'hidden';
            return;
        }

        if (isManualUpdate) {
            const lastAmount = historyData.length > 0 ? historyData[historyData.length - 1].amount : 0;
            const diff = saved - lastAmount;
            if (diff !== 0) {
                const now = new Date();
                const dateStr = now.toLocaleDateString() + ", " + now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                historyData.push({ date: dateStr, amount: saved, diff: diff });
                updateHistoryUI();
            }
        }

        document.getElementById('resultsArea').style.visibility = 'visible';
        const remaining = Math.max(target - saved, 0);
        const percentSaved = Math.min((saved / target) * 100, 100);

        document.getElementById('valRemaining').innerText = symbol + " " + remaining.toLocaleString(undefined, {minimumFractionDigits: 2});
        document.getElementById('valSavedPerc').innerText = percentSaved.toFixed(1) + "%";
        document.getElementById('perc-val').innerText = Math.floor(percentSaved) + "%";

        const ctx = document.getElementById('myChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: [translations[lang].saved, translations[lang].missing],
                datasets: [{
                    data: [saved, remaining],
                    backgroundColor: ['#4ade80', '#334155'],
                    borderWidth: 0,
                    cutout: '85%'
                }]
            },
            options: {
                plugins: { legend: { display: false } },
                animation: { duration: 800 }
            }
        });
        saveData();
    }

    function convertCurrency() {
        const newCurrency = document.getElementById('currencySelect').value;
        const targetInput = document.getElementById('target');
        const savedInput = document.getElementById('saved');
        const rate = exchangeRates[newCurrency] / exchangeRates[currentCurrency];
        if(targetInput.value) targetInput.value = (parseFloat(targetInput.value) * rate).toFixed(2);
        if(savedInput.value) savedInput.value = (parseFloat(savedInput.value) * rate).toFixed(2);
        historyData = historyData.map(item => ({
            ...item,
            amount: item.amount * rate,
            diff: item.diff * rate
        }));
        currentCurrency = newCurrency;
        updateHistoryUI();
        calculate(false);
    }

    function updateLanguage() {
        const lang = document.getElementById('langSelect').value;
        const t = translations[lang];
        
        // Aggiornamento testi principali
        document.getElementById('title').innerText = t.title;
        document.getElementById('lblReason').innerText = t.lblReason;
        document.getElementById('lblTarget').innerText = t.lblTarget;
        document.getElementById('lblSaved').innerText = t.lblSaved;
        document.getElementById('btnCalc').innerText = t.btnCalc;
        document.getElementById('txtMissing').innerText = t.txtMissing;
        document.getElementById('txtSavedPerc').innerText = t.txtSavedPerc;
        document.getElementById('perc-label').innerText = t.completed;

        // Aggiornamento nuove sezioni
        document.getElementById('titleTrend').innerText = t.trend;
        document.getElementById('titleHistory').innerText = t.history;
        document.getElementById('btnClearHistory').innerText = t.clearBtn;

        calculate(false);
    }
</script>

</body>
</html>
